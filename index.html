<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EDA Verification Terminal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Ubuntu Mono', 'Courier New', monospace;
            background: #300a24;
            color: #00ff00;
            height: 100vh;
            overflow: hidden;
        }

        .terminal-container {
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .terminal-header {
            background: linear-gradient(to bottom, #4e4e4e, #2d2d2d);
            padding: 8px 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 1px solid #1a1a1a;
        }

        .terminal-buttons {
            display: flex;
            gap: 8px;
        }

        .terminal-button {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }

        .close { background: #fc5753; }
        .minimize { background: #fdbc40; }
        .maximize { background: #34c749; }

        .terminal-title {
            flex: 1;
            text-align: center;
            color: #ddd;
            font-size: 13px;
            font-weight: 500;
        }

        .terminal-body {
            flex: 1;
            background: #300a24;
            padding: 15px;
            overflow-y: auto;
            font-size: 14px;
            line-height: 1.6;
        }

        .terminal-output {
            margin-bottom: 10px;
        }

        .output-line {
            margin: 2px 0;
        }

        .prompt {
            color: #8ae234;
            font-weight: bold;
        }

        .path {
            color: #729fcf;
        }

        .command {
            color: #ffffff;
        }

        .error {
            color: #ef2929;
        }

        .success {
            color: #8ae234;
        }

        .warning {
            color: #fcaf3e;
        }

        .info {
            color: #729fcf;
        }

        .comment {
            color: #888a85;
        }

        .input-line {
            display: flex;
            align-items: center;
        }

        #terminal-input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: #ffffff;
            font-family: inherit;
            font-size: inherit;
            margin-left: 5px;
        }

        .cursor {
            display: inline-block;
            width: 8px;
            height: 16px;
            background: #00ff00;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }

        .help-section {
            margin: 10px 0;
            border-left: 3px solid #729fcf;
            padding-left: 10px;
        }

        .tool-output {
            font-family: 'Courier New', monospace;
            font-size: 12px;
        }

        ::-webkit-scrollbar {
            width: 10px;
        }

        ::-webkit-scrollbar-track {
            background: #1a0a14;
        }

        ::-webkit-scrollbar-thumb {
            background: #555;
            border-radius: 5px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #777;
        }

        .banner {
            color: #ad7fa8;
            font-weight: bold;
            text-align: center;
            margin: 10px 0;
        }

        .file-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 5px;
            margin: 5px 0;
        }

        .file-item {
            color: #ffffff;
        }

        .dir-item {
            color: #729fcf;
            font-weight: bold;
        }

        .exec-item {
            color: #8ae234;
        }

        table {
            border-collapse: collapse;
            margin: 10px 0;
            width: 100%;
        }

        table td, table th {
            padding: 5px 10px;
            text-align: left;
        }

        table th {
            color: #fcaf3e;
            border-bottom: 1px solid #555;
        }
    </style>
</head>
<body>
    <div class="terminal-container">
        <div class="terminal-header">
            <div class="terminal-buttons">
                <div class="terminal-button close"></div>
                <div class="terminal-button minimize"></div>
                <div class="terminal-button maximize"></div>
            </div>
            <div class="terminal-title">verification@eda-workstation: ~/verification_project</div>
        </div>
        
        <div class="terminal-body" id="terminal-output">
            <!-- Output will be inserted here -->
        </div>
        
        <div class="input-line" style="padding: 0 15px 15px 15px;">
            <span class="prompt">verification@eda-workstation</span>:<span class="path">~/verification_project</span>$ 
            <input type="text" id="terminal-input" autofocus autocomplete="off" spellcheck="false">
        </div>
    </div>

    <script>
        // Terminal state
        let currentDir = '/home/verification/verification_project';
        let commandHistory = [];

        let fileSystem = {

                    'verification_project': {
                        type: 'dir',
                        contents: {
                            'rtl': {
                                type: 'dir',
                                contents: {
                                    'fifo.sv': { type: 'file', content: 'module fifo...' },
                                    'apb_slave.sv': { type: 'file', content: 'module apb_slave...' },
                                    'uart.sv': { type: 'file', content: 'module uart...' }
                                }
                            },
                            'tb': {
                                type: 'dir',
                                contents: {
                                    'fifo_if.sv': { type: 'file', content: 'interface fifo_if...' },
                                    'fifo_test.sv': { type: 'file', content: 'class fifo_test...' },
                                    'tb_top.sv': { type: 'file', content: 'module tb_top...' }
                                }
                            },

                                type: 'dir',
                                contents: {
                                    'Makefile': { type: 'file', content: 'VCS = vcs\nall: compile run' }
                                }
                            },
                            'reports': {
                                type: 'dir',
                                contents: {}
                            },
                            'scripts': {
                                type: 'dir',
                                contents: {
                                    'run.sh': { type: 'file', content: '#!/bin/bash\nvcs ...' }
                                }
                            }
                        }
                    }
                }
            }
        };

        const terminalOutput = document.getElementById('terminal-output');
        const terminalInput = document.getElementById('terminal-input');

        // Initialize terminal
        function initTerminal() {
            printWelcomeBanner();
            terminalInput.focus();

        function printWelcomeBanner() {
            addOutput(`
<div class="banner">

║         SystemVerilog/UVM Environment Ready                   ║
╚═══════════════════════════════════════════════════════════════╝
</div>
<div class="success">✓ Synopsys VCS 2024.03 - Ready</div>
<div class="success">✓ Mentor Questa 2024.1 - Ready</div>
<div class="success">✓ Cadence Xcelium 23.09 - Ready</div>
<div class="success">✓ UVM 1.2 Library - Loaded</div>
<div class="info">
Type 'help' for available commands
Type 'tools' to see all EDA tools
Type 'workflow' to see verification workflow examples
</div>
            `);
        }

        function addOutput(html) {
            terminalOutput.innerHTML += html;
            terminalOutput.scrollTop = terminalOutput.scrollHeight;
        }

        function executeCommand(cmd) {
            const trimmedCmd = cmd.trim();
            if (!trimmedCmd) return;

            // Add to history
            commandHistory.push(trimmedCmd);
            historyIndex = commandHistory.length;

            // Display command
            addOutput(`<div class="output-line"><span class="prompt">verification@eda-workstation</span>:<span class="path">${getCurrentDirShort()}</span>$ <span class="command">${escapeHtml(trimmedCmd)}</span></div>`);

            // Parse and execute
            const parts = trimmedCmd.split(/\s+/);
            const command = parts[0];
            const args = parts.slice(1);

            if (commands[command]) {
                commands[command](args);
            } else {
                addOutput(`<div class="error">Command not found: ${command}. Type 'help' for available commands.</div>`);
            }
        }

        // Command handlers
        const commands = {

                addOutput(`

<div class="success">Top level modules:</div>
<div class="success">    tb_top</div>
<div class="success">✓ Compilation successful</div>
</div>`);
            },

            vsim: (args) => {
                addOutput(`<div class="tool-output">
<div class="warning">Mentor QuestaSim - Starting simulation</div>
<div class="info"># vsim work.tb_top</div>
<div class="comment"># Loading work.tb_top</div>
<div class="comment"># Loading work.fifo</div>

            xrun: (args) => {
                addOutput(`<div class="tool-output">

            runtest: () => {
                addOutput(`<div class="tool-output">

<div class="info">[1/5] Compiling design files...</div>

            },

            coverage: () => {
                addOutput(`<div class="tool-output">

<table>

</div>`);

            ls: (args) => {
                const path = args[0] || currentDir;
                const items = getDirectoryContents(path);
                if (items) {
                    let output = '<div class="file-list">';
                    Object.keys(items).forEach(name => {
                        const item = items[name];
                        const className = item.type === 'dir' ? 'dir-item' : 
                                        name.endsWith('.sh') ? 'exec-item' : 'file-item';
                        output += `<div class="${className}">${name}${item.type === 'dir' ? '/' : ''}</div>`;
                    });
                    output += '</div>';
                    addOutput(output);
                } else {
                    addOutput(`<div class="error">ls: cannot access '${path}': No such file or directory</div>`);
                }
            },

            pwd: () => {
                addOutput(`<div class="info">${currentDir}</div>`);
            },

            cd: (args) => {
                if (!args[0] || args[0] === '~') {
                    currentDir = '/home/verification/verification_project';
                    addOutput(`<div class="info">Changed to home directory</div>`);
                } else if (args[0] === '..') {
                    const parts = currentDir.split('/').filter(p => p);
                    parts.pop();
                    currentDir = '/' + parts.join('/');
                    addOutput(`<div class="info">Changed to parent directory</div>`);
                } else {
                    const newPath = resolvePath(args[0]);
                    if (pathExists(newPath)) {
                        currentDir = newPath;
                        addOutput(`<div class="info">Changed directory to ${currentDir}</div>`);
                    } else {
                        addOutput(`<div class="error">cd: ${args[0]}: No such file or directory</div>`);
                    }
                }
            },

            cat: (args) => {
                if (!args[0]) {
                    addOutput(`<div class="error">cat: missing file operand</div>`);
                    return;
                }
                const file = getFileObject(resolvePath(args[0]));
                if (file && file.type === 'file') {
                    addOutput(`<div class="info">${escapeHtml(file.content)}</div>`);
                } else {
                    addOutput(`<div class="error">cat: ${args[0]}: No such file or directory</div>`);
                }
            },

            mkdir: (args) => {
                if (!args[0]) {
                    addOutput(`<div class="error">mkdir: missing operand</div>`);
                    return;
                }
                addOutput(`<div class="success">✓ Directory created: ${args[0]}</div>`);
            },

            rm: (args) => {
                if (!args[0]) {
                    addOutput(`<div class="error">rm: missing operand</div>`);
                    return;
                }
                addOutput(`<div class="success">✓ Removed: ${args[0]}</div>`);
            },

            clear: () => {
                terminalOutput.innerHTML = '';
            },

            history: () => {
                commandHistory.forEach((cmd, idx) => {
                    addOutput(`<div class="info">${idx + 1}  ${escapeHtml(cmd)}</div>`);
                });
            },

            make: (args) => {
                const target = args[0] || 'all';
                addOutput(`<div class="tool-output">
<div class="info">make: Entering directory '${currentDir}/sim'</div>
<div class="comment">vcs -sverilog -ntb_opts uvm-1.2 ../rtl/*.sv ../tb/*.sv</div>

</div>`);

            verdi: () => {
                addOutput(`<div class="tool-output">
<div class="warning">Synopsys Verdi - Debug Platform</div>
<div class="info">Opening Verdi GUI...</div>
<div class="success">✓ Verdi launched successfully</div>

</div>`);

                addOutput(`<div class="tool-output">
<div class="warning">Design Compiler Shell (Synopsys)</div>
<div class="info">dc_shell-xg-t> </div>

        // Helper functions
        function getCurrentDirShort() {
            return currentDir.replace('/home/verification/', '~/');
        }

        function getDirectoryContents(path) {
            const obj = getFileObject(path);
            return obj && obj.type === 'dir' ? obj.contents : null;
        }

        function getFileObject(path) {
            const parts = path.split('/').filter(p => p);
            let current = fileSystem;
            
            for (let part of parts) {
                if (current[part]) {
                    current = current[part];
                } else if (current.contents && current.contents[part]) {
                    current = current.contents[part];
                } else {
                    return null;
                }
            }
            return current;
        }

        function resolvePath(path) {
            if (path.startsWith('/')) return path;
            if (path.startsWith('~')) return path.replace('~', '/home/verification/verification_project');
            return currentDir + '/' + path;
        }

        function pathExists(path) {
            return getFileObject(path) !== null;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Input handling
        terminalInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                const command = terminalInput.value;
                terminalInput.value = '';
                executeCommand(command);
            } else if (e.key === 'ArrowUp') {
                e.preventDefault();
                if (historyIndex > 0) {
                    historyIndex--;
                    terminalInput.value = commandHistory[historyIndex];
                }
            } else if (e.key === 'ArrowDown') {
                e.preventDefault();
                if (historyIndex < commandHistory.length - 1) {
                    historyIndex++;
                    terminalInput.value = commandHistory[historyIndex];
                } else {
                    historyIndex = commandHistory.length;
                    terminalInput.value = '';
                }
            } else if (e.key === 'Tab') {
                e.preventDefault();
                // Basic tab completion could be added here
            }
        });

        // Keep focus on input
        document.addEventListener('click', () => {
            terminalInput.focus();
        });

        // Initialize
        initTerminal();
    </script>
</body>
</html>
